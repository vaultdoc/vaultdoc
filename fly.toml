# fly.toml — deploy to Fly.io with `fly launch` then `fly deploy`
app = "vaultdoc"
primary_region = "cdg"  # Paris — change to your nearest: https://fly.io/docs/reference/regions/

[build]

[processes]
  app = "node dist/cloud/server.js"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

[mounts]
  source = "vaultdoc_data"
  destination = "/data"
