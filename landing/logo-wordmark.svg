<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" fill="none">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#1f6feb"/>
    </linearGradient>
  </defs>

  <!-- Icon (40x40, centered at y=20) -->
  <g transform="translate(8, 0)">
    <!-- Outer ring -->
    <circle cx="40" cy="40" r="28" fill="#58a6ff" opacity="0.1"/>
    <circle cx="40" cy="40" r="28" stroke="url(#g1)" stroke-width="2"/>
    <!-- Inner ring -->
    <circle cx="40" cy="40" r="20" stroke="#58a6ff" stroke-width="1" opacity="0.35"/>
    <!-- Bolts -->
    <circle cx="40" cy="14" r="2.5" fill="#58a6ff" opacity="0.6"/>
    <circle cx="40" cy="66" r="2.5" fill="#58a6ff" opacity="0.6"/>
    <circle cx="14" cy="40" r="2.5" fill="#58a6ff" opacity="0.6"/>
    <circle cx="66" cy="40" r="2.5" fill="#58a6ff" opacity="0.6"/>
    <!-- Doc -->
    <rect x="29" y="27" width="18" height="24" rx="2" fill="#0d1117" stroke="#8b949e" stroke-width="1.2"/>
    <!-- Fold -->
    <polyline points="40,27 47,34 40,34" fill="#161b22" stroke="#8b949e" stroke-width="1.2" stroke-linejoin="round"/>
    <!-- Lines -->
    <line x1="33" y1="39" x2="44" y2="39" stroke="#58a6ff" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="33" y1="44" x2="44" y2="44" stroke="#58a6ff" stroke-width="1"   stroke-linecap="round" opacity="0.55"/>
    <line x1="33" y1="49" x2="39" y2="49" stroke="#58a6ff" stroke-width="1"   stroke-linecap="round" opacity="0.35"/>
    <!-- Handle -->
    <circle cx="62" cy="40" r="4" stroke="#58a6ff" stroke-width="1.5" fill="none"/>
    <line x1="64" y1="40" x2="68" y2="40" stroke="#58a6ff" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Wordmark -->
  <text x="90" y="50"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="32"
    font-weight="700"
    letter-spacing="-1"
    fill="#e6edf3">vault</text>
  <text x="172" y="50"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="32"
    font-weight="700"
    letter-spacing="-1"
    fill="url(#g1)">doc</text>
</svg>
