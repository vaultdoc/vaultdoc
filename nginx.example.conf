# Drop this in /etc/nginx/sites-available/vaultdoc and symlink to sites-enabled/
# Assumes certbot is installed: certbot --nginx -d vaultdoc.yourdomain.com

server {
    listen 80;
    server_name vaultdoc.yourdomain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name vaultdoc.yourdomain.com;

    ssl_certificate     /etc/letsencrypt/live/vaultdoc.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vaultdoc.yourdomain.com/privkey.pem;

    # Only allow VPN subnet — adjust to match your WireGuard/OpenVPN range
    allow 10.8.0.0/24;
    deny all;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
