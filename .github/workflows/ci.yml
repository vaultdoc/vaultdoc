name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  typecheck-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: typecheck-and-build
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker build -t team-docs-mcp:ci .
